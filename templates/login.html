{% extends "base.html" %}

{% block title %}Вход - AI Archive{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>С возвращением!</h2>
    <p class="subtitle">Рады видеть вас снова</p>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username" class="required">Имя пользователя</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password" class="required">Пароль</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="remember" checked>
                Запомнить меня
            </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Войти</button>
    </form>

    <p>Нужен аккаунт? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
</div>
{% endblock %}

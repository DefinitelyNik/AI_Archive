{% extends "base.html" %}

{% block title %}Регистрация - AI Archive{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Создать аккаунт</h2>
    <p class="subtitle">Присоединяйтесь к AI Archive</p>

    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username" class="required">Имя пользователя</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password" class="required">Пароль</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Зарегистрироваться</button>
    </form>

    <p>Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
</div>
{% endblock %}

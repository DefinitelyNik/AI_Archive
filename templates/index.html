{% extends "base.html" %}

{% block title %}AI Archive - Home{% endblock %}

{% block content %}
<div class="input-section">
    <h1>Загрузка изображения</h1>

    <form method="POST" enctype="multipart/form-data" class="upload-form">
        <div class="form-group">
            <label class="toggle-label" for="image">Выберите изображение:</label>
            <label for="image" class="upload-label">Выбрать файл</label>
            <input type="file" name="image" id="image" accept="image/*" required style="display: none;">
            <span class="file-name" id="file-name">Файл не выбран</span>
        </div>

        <div class="form-group">
            <label class="toggle-label">Тип текста:</label>
            <select name="text_type" id="text_type" class="text-type-select" onchange="toggleOCRModel()">
                <option value="ocr">Печатный текст (OCR)</option>
                <option value="htr">Рукописный текст (HTR)</option>
            </select>
        </div>

        <div class="form-group" id="ocr-model-group">
            <label class="toggle-label">Модель OCR:</label>
            <select name="ocr_model" id="ocr_model" class="text-type-select">
                <option value="easyocr">EasyOCR</option>
                <option value="tesseract">Tesseract 5 (LSTM)</option>
            </select>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="translate">
                Перевести с дореволюционного русского
            </label>
        </div>

        <button type="submit" class="submit-btn">Обработать</button>
    </form>
</div>

<div class="legend">
    <h3>Легенда NER-тегов:</h3>
    <ul>
        <li>
            <span class="legend-mark ner-per"></span>
            <span>PER - Персона</span>
        </li>
        <li>
            <span class="legend-mark ner-loc"></span>
            <span>LOC - Местоположение</span>
        </li>
        <li>
            <span class="legend-mark ner-org"></span>
            <span>ORG - Организация</span>
        </li>
        <li>
            <span class="legend-mark ner-date"></span>
            <span>DATE - Дата</span>
        </li>
    </ul>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleOCRModel() {
    const textType = document.getElementById('text_type').value;
    const ocrModelGroup = document.getElementById('ocr-model-group');

    if (textType === 'htr') {
        ocrModelGroup.style.display = 'none';
    } else {
        ocrModelGroup.style.display = 'flex';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    toggleOCRModel();

    // Обновление имени файла при выборе
    const fileInput = document.getElementById('image');
    const fileName = document.getElementById('file-name');

    fileInput.addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            fileName.textContent = this.files[0].name;
        } else {
            fileName.textContent = 'Файл не выбран';
        }
    });
});
</script>
{% endblock %}
